---
layout: default
title: davidajowi.com
---

<div id="home">
  <ul class="posts">
    {% for post in site.posts %}
      <li>
      <div class="post">
	<h1><span class="ptitle"><a href="{{ post.url }}">{{ post.title }}</a></span></h1>
	<span class="pdate">{{ post.date | date_to_string }}</span>
	{{ post.content }}
      </div>
     </li>
     
    {% endfor %}
  </ul>
</div>
