---
layout: default
title: David Ajowi
---

<div id="home">
  <ul class="posts">
    {% for post in site.posts %}
      <li>
	<h1><span class="ptitle"><a href="{{ post.url }}">{{ post.title }}</a></span></h1>
	<span class="pdate">{{ post.date | date_to_string }}</span>
	{{ post.content }}
	</li>
    {% endfor %}
  </ul>
</div>
